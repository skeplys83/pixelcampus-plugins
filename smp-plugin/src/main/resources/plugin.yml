name: Pixelcampus-SMP
version: '1.0'
main: org.pixelcampus.smp.Smp
api-version: '1.21'
folia-supported: true
commands:
  stats:
    description: Shows online leaderboard stats or a single player's stats
    usage: /stats [player|playtime|deaths|streak|kills|blocks|distance]
    permission: smp.stats.online
    aliases: []
  statsall:
    description: Shows leaderboard stats for all players (online and offline)
    usage: /statsall [playtime|deaths|streak|kills|blocks|distance]
    permission: smp.stats.all
    aliases: []
permissions:
  smp.stats.online:
    description: Allows viewing online players' stats
    default: true
  smp.stats.all:
    description: Allows viewing all players' stats
    default: op
  smp.speedladder.use:
    description: Allows using the speed ladder boost
    default: true

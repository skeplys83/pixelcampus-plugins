name: Build and deploy JumpAndRun plugin

on:
  push:
    branches:
      - main
    paths:
      - 'jumpandrun-plugin/**'
  workflow_dispatch:

concurrency:
  group: deploy-jumpandrun-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make deploy script executable
        run: chmod +x jumpandrun-plugin/scripts/deploy.sh

      - name: Check SFTP connectivity from runner
        env:
          JNR_SFTP_HOST: ${{ vars.JNR_SFTP_HOST }}
          JNR_SFTP_PORT: ${{ vars.JNR_SFTP_PORT }}
        run: |
          if [[ -z "${JNR_SFTP_HOST:-}" || -z "${JNR_SFTP_PORT:-}" ]]; then
            echo "::error::JNR_SFTP_HOST or JNR_SFTP_PORT is not configured in repository variables."
            exit 1
          fi
          echo "Runner public IP: $(curl -s https://api.ipify.org)"
          echo "Checking reachability: ${JNR_SFTP_HOST}:${JNR_SFTP_PORT}"
          if ! nc -zvw10 "$JNR_SFTP_HOST" "$JNR_SFTP_PORT"; then
            echo "::error::Cannot reach ${JNR_SFTP_HOST}:${JNR_SFTP_PORT} from this GitHub runner."
            echo "::error::Allowlist the runner IP above in your firewall/provider or use a self-hosted runner."
            exit 1
          fi

      - name: Run deploy script
        working-directory: jumpandrun-plugin
        env:
          JNR_SFTP_PASSWORD: ${{ secrets.JNR_SFTP_PASSWORD }}
          JNR_CLIENT_API_KEY: ${{ secrets.JNR_CLIENT_API_KEY }}
          JNR_SFTP_USER: ${{ secrets.JNR_SFTP_USER }}
          JNR_SFTP_HOST: ${{ vars.JNR_SFTP_HOST }}
          JNR_SFTP_PORT: ${{ vars.JNR_SFTP_PORT }}
          JNR_SERVER_ID: ${{ vars.JNR_SERVER_ID }}
          JNR_PANEL_URL: ${{ vars.JNR_PANEL_URL }}
          JNR_PLUGIN_FILE_NAME: ${{ vars.JNR_PLUGIN_FILE_NAME }}

        run: ./scripts/deploy.sh

name: Build and deploy JumpAndRun plugin

on:
  push:
    branches:
      - main
    paths:
      - 'jumpandrun-plugin/**'
  workflow_dispatch:

concurrency:
  group: deploy-jumpandrun-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      JNR_SFTP_HOST: ${{ secrets.JNR_SFTP_HOST }}
      JNR_SFTP_PORT: ${{ secrets.JNR_SFTP_PORT }}
      JNR_SERVER_ID: ${{ secrets.JNR_SERVER_ID }}
      JNR_PANEL_URL: ${{ secrets.JNR_PANEL_URL }}
      JNR_SFTP_USER: ${{ secrets.JNR_SFTP_USER }}
      JNR_SFTP_SSH_KEY: ${{ secrets.JNR_SFTP_SSH_KEY }}
      JNR_CLIENT_API_KEY: ${{ secrets.JNR_CLIENT_API_KEY }}
      JNR_PLUGIN_FILE_NAME: ${{ secrets.JNR_PLUGIN_FILE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make deploy script executable
        run: chmod +x jumpandrun-plugin/scripts/deploy.sh

      - name: Validate deploy environment
        run: |
          missing=0
          required=(
            JNR_SFTP_HOST
            JNR_SFTP_PORT
            JNR_SERVER_ID
            JNR_PANEL_URL
            JNR_SFTP_USER
            JNR_SFTP_SSH_KEY
            JNR_CLIENT_API_KEY
            JNR_PLUGIN_FILE_NAME
          )
          for var in "${required[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required variable: $var"
              missing=1
            else
              echo "$var is configured"
            fi
          done
          exit "$missing"

      - name: Run deploy script
        working-directory: jumpandrun-plugin
        run: ./scripts/deploy.sh

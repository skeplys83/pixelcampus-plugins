name: Build and deploy JumpAndRun plugin

on:
  push:
    branches:
      - main
    paths:
      - 'jumpandrun-plugin/**'
  workflow_dispatch:

concurrency:
  group: deploy-jumpandrun-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make deploy script executable
        run: chmod +x jumpandrun-plugin/scripts/deploy.sh

      - name: Check SFTP connectivity from runner
        env:
          PTERODACTYL_SFTP_HOST: ${{ vars.PTERODACTYL_SFTP_HOST }}
          PTERODACTYL_SFTP_PORT: ${{ vars.PTERODACTYL_SFTP_PORT }}
        run: |
          if [[ -z "${PTERODACTYL_SFTP_HOST:-}" || -z "${PTERODACTYL_SFTP_PORT:-}" ]]; then
            echo "::error::PTERODACTYL_SFTP_HOST or PTERODACTYL_SFTP_PORT is not configured in repository variables."
            exit 1
          fi
          echo "Runner public IP: $(curl -s https://api.ipify.org)"
          echo "Checking reachability: ${PTERODACTYL_SFTP_HOST}:${PTERODACTYL_SFTP_PORT}"
          if ! nc -zvw10 "$PTERODACTYL_SFTP_HOST" "$PTERODACTYL_SFTP_PORT"; then
            echo "::error::Cannot reach ${PTERODACTYL_SFTP_HOST}:${PTERODACTYL_SFTP_PORT} from this GitHub runner."
            echo "::error::Allowlist the runner IP above in your firewall/provider or use a self-hosted runner."
            exit 1
          fi

      - name: Set global MTU to fix upload hang
        run: sudo ip link set dev eth0 mtu 1000

      - name: Run deploy script
        working-directory: jumpandrun-plugin
        env:
          PTERODACTYL_SFTP_SSH_KEY: ${{ secrets.PTERODACTYL_SFTP_SSH_KEY }}
          PTERODACTYL_API_KEY: ${{ secrets.PTERODACTYL_API_KEY }}
          PTERODACTYL_TESTSERVER_SFTP_USER: ${{ secrets.PTERODACTYL_TESTSERVER_SFTP_USER }}
          PTERODACTYL_SFTP_HOST: ${{ vars.PTERODACTYL_SFTP_HOST }}
          PTERODACTYL_SFTP_PORT: ${{ vars.PTERODACTYL_SFTP_PORT }}
          PTERODACTYL_PANEL_URL: ${{ vars.PTERODACTYL_PANEL_URL }}
          JUMPANDRUN_SERVER_ID: ${{ vars.JUMPANDRUN_SERVER_ID }}
          JUMPANDRUN_PLUGIN_FILE_NAME: ${{ vars.JUMPANDRUN_PLUGIN_FILE_NAME }}

        run: ./scripts/deploy.sh

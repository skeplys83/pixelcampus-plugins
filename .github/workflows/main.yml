name: Build and deploy JumpAndRun plugin

on:
  push:
    branches:
      - main
    paths:
      - 'jumpandrun-plugin/**'

concurrency:
  group: deploy-jumpandrun-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: jumpandrun-plugin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew build

      - name: Find built jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | head -n 1)

          if [ -z "$JAR_PATH" ]; then
            echo "No plugin jar found."
            exit 1
          fi

          echo "JAR_PATH=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload plugin to JumpAndRun server
        run: |
          lftp -u "${{ secrets.JNR_SFTP_USER }},${{ secrets.JNR_SFTP_PASSWORD }}" \
          sftp://${{ vars.JNR_SFTP_HOST }}:${{ vars.JNR_SFTP_PORT }} <<EOF
          set sftp:auto-confirm yes
          put "$JAR_PATH" -o "/plugins/${{ vars.JNR_PLUGIN_FILE_NAME }}"
          bye
          EOF

      - name: Restart JumpAndRun server
        run: |
          curl -X POST "${{ vars.JNR_PANEL_URL }}/api/client/servers/${{ vars.JNR_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.JNR_CLIENT_API_KEY }}" \
            -H "Accept: Application/vnd.pterodactyl.v1+json" \
            -H "Content-Type: application/json" \
            -d '{"signal":"restart"}'

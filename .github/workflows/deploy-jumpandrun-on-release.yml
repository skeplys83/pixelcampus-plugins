name: Deploy JumpAndRun to Pterodactyl (on release)

on:
  release:
    types:
      - published

concurrency:
  group: deploy-jumpandrun-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ startsWith(github.event.release.tag_name, 'jumpandrun-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release jar
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-assets/jumpandrun
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.jar" \
            --dir release-assets/jumpandrun

          JAR_PATH=$(find release-assets/jumpandrun -maxdepth 1 -type f -name "*.jar" | head -n 1)

          if [[ -z "$JAR_PATH" ]]; then
            echo "::error::No jar asset found in release ${{ steps.meta.outputs.tag }}"
            exit 1
          fi

          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Make deploy script executable
        run: chmod +x jumpandrun-plugin/scripts/deploy.sh

      - name: Set global MTU to fix upload hang
        run: sudo ip link set dev eth0 mtu 1000

      - name: Run deploy script
        working-directory: jumpandrun-plugin
        env:
          DEPLOY_JAR_PATH: ${{ github.workspace }}/${{ steps.artifact.outputs.jar_path }}
          PTERODACTYL_SFTP_SSH_KEY: ${{ secrets.PTERODACTYL_SFTP_SSH_KEY }}
          PTERODACTYL_API_KEY: ${{ secrets.PTERODACTYL_API_KEY }}
          PTERODACTYL_TESTSERVER_SFTP_USER: ${{ secrets.PTERODACTYL_TESTSERVER_SFTP_USER }}

        run: ./scripts/deploy.sh
